# Species definitions for CH4/CO2/N2/O2 plasma chemistry
# All species tracked in concentration basis [mol/m3]
#
# type: electron / neutral / radical / excited / ion_positive / ion_negative
# mass: molar mass [kg/mol]
# delta_hf_kj: standard formation enthalpy [kJ/mol] at 298K
#   Sources: NIST-JANAF, ATcT, NIST WebBook
#   Ions: computed from neutral + IP (positive) or - EA (negative)
#   Excited states: ground state + excitation energy

species:
  # Electron
  - name: e
    type: electron
    mass: 5.486e-07
    delta_hf_kj: 0.0

  # Feed gas molecules
  - name: CH4
    type: neutral
    mass: 0.01604
    delta_hf_kj: -74.8
  - name: CO2
    type: neutral
    mass: 0.04401
    delta_hf_kj: -393.5
