# Aqueous Phase Reaction Database for Saline (NaCl) Chemistry
# Based on: Liu et al., Plasma Processes and Polymers (2016)
# "Chemical kinetics and reactive species in normal saline activated by a surface air discharge"
#
# These reactions are ADDITIONAL to the base NOx reactions (reactions.yaml)
# Only loaded when "Saline solution" is selected in GUI

metadata:
  version: "1.0"
  description: "Chlorine aqueous chemistry reactions for saline solution"
  reference: "Plasma Processes and Polymers, ppap.201600113"
  temperature: 298.15  # K
  units:
    concentration: "mol/L"
    rate_constant_unimolecular: "1/s"
    rate_constant_bimolecular: "L/(mol·s)"

# =============================================================================
# Reversible Reactions (1-18)
# =============================================================================
reversible_reactions:
  - id: "S1"
    type: "reversible"
    reactants:
      Cl2: 1
    products:
      H+: 1
      Cl-: 1
      HClO: 1
    k_f: 22
    k_b: 4.3e4
    label: "S1: Cl2 + H2O <-> H+ + Cl- + HClO"

  # S2 제거: HCl은 강산(pKa=-6~-7), 완전 해리 가정
  # HCl <-> H+ + Cl- (k_f=8.6e16) - stiffness 원인

  - id: "S3"
    type: "reversible"
    reactants:
      HOCl-: 1
      Cl-: 1
    products:
      Cl2-: 1
      OH-: 1
    k_f: 1.0e4
    k_b: 4.5e7
    label: "S3: HOCl- + Cl- <-> Cl2- + OH-"

  - id: "S4"
    type: "reversible"
    reactants:
      OH: 1
      Cl-: 1
    products:
      HOCl-: 1
    k_f: 4.3e9
    k_b: 6.1e9
    label: "S4: OH + Cl- <-> HOCl-"

  - id: "S5"
    type: "reversible"
    reactants:
      Cl: 1
    products:
      HOCl-: 1
      H+: 1
    k_f: 1.8e5
    k_b: 2.1e10
    label: "S5: Cl + H2O <-> HOCl- + H+"

  - id: "S6"
    type: "reversible"
    reactants:
      Cl: 1
      Cl-: 1
    products:
      Cl2-: 1
    k_f: 7.8e9
    k_b: 5.7e4
    label: "S6: Cl + Cl- <-> Cl2-"

  - id: "S7"
    type: "reversible"
    reactants:
      HOClH: 1
    products:
      HOCl-: 1
      H+: 1
    k_f: 1e8
    k_b: 3.0e10
    label: "S7: HOClH <-> HOCl- + H+"

  - id: "S8"
    type: "reversible"
    reactants:
      Cl2-: 1
    products:
      HOClH: 1
      Cl-: 1
    k_f: 1.3e3
    k_b: 8e9
    label: "S8: Cl2- + H2O <-> HOClH + Cl-"

  - id: "S9"
    type: "reversible"
    reactants:
      Cl2-: 1
      OH-: 1
    products:
      HOCl-: 1
      Cl-: 1
    k_f: 4.0e6
    k_b: 1.0e4
    label: "S9: Cl2- + OH- <-> HOCl- + Cl-"

  - id: "S10"
    type: "reversible"
    reactants:
      Cl2: 1
      OH-: 1
    products:
      HClO: 1
      Cl-: 1
    k_f: 1.0e8
    k_b: 2.0e-3
    label: "S10: Cl2 + OH- <-> HClO + Cl-"

  - id: "S11"
    type: "reversible"
    reactants:
      Cl2O: 1
    products:
      HClO: 2
    k_f: 7.0
    k_b: 0.08
    label: "S11: Cl2O + H2O <-> 2HClO"

  - id: "S12"
    type: "reversible"
    reactants:
      Cl2O: 1
      H+: 1
    products:
      HClO: 2
      H+: 1
    k_f: 270
    k_b: 3.1
    label: "S12: Cl2O + H+ + H2O <-> 2HClO + H+"

  - id: "S13"
    type: "reversible"
    reactants:
      ClO2-: 1
      O3: 1
    products:
      ClO2: 1
      O3-: 1
    k_f: 8.2e6
    k_b: 1.8e5
    label: "S13: ClO2- + O3 <-> ClO2 + O3-"

  - id: "S14"
    type: "reversible"
    reactants:
      Cl2O2: 1
      ClO2-: 1
    products:
      ClO2: 2
      Cl-: 1
    k_f: 1.5e3
    k_b: 5.5e5
    label: "S14: Cl2O2 + ClO2- <-> 2ClO2 + Cl-"

  - id: "S15"
    type: "reversible"
    reactants:
      Cl2O2: 1
    products:
      ClO2-: 1
      HClO: 1
      H+: 1
    k_f: 0.1
    k_b: 1.01e6
    label: "S15: Cl2O2 + H2O <-> ClO2- + HClO + H+"

  # S16 제거: HClO2 <-> H+ + ClO2- → algebraic speciation으로 처리 (pKa=1.95)
  # S17 제거: HClO <-> H+ + ClO- → algebraic speciation으로 처리 (pKa=7.5)

  - id: "S18"
    type: "reversible"
    reactants:
      HClO2: 2
    products:
      Cl2O3: 1
    k_f: 100
    k_b: 1e4
    label: "S18: 2HClO2 <-> Cl2O3 + H2O"

# =============================================================================
# Irreversible Reactions (19-96)
# =============================================================================
irreversible_reactions:
  - id: "S19"
    type: "irreversible"
    reactants:
      Cl-: 1
      O3: 1
    products:
      ClO-: 1
      O2: 1
    k: 2e-3
    label: "S19: Cl- + O3 -> ClO- + O2"

  - id: "S20"
    type: "irreversible"
    reactants:
      Cl-: 1
      H2O2: 1
    products:
      ClO-: 1
    k: 1.8e-9
    label: "S20: Cl- + H2O2 -> ClO- + H2O"

  - id: "S21"
    type: "irreversible"
    reactants:
      Cl-: 1
      H2O2: 1
      H+: 1
    products:
      HClO: 1
    k: 8.3e-7
    label: "S21: Cl- + H2O2 + H+ -> HClO + H2O"

  # S22 REMOVED: Double-counting with S4 (OH + Cl- <-> HOCl-).
  # S22 is the net outcome of the S4->S5 pathway (same k=4.3e9, same reactants).
  # Including both doubles OH consumption by Cl-. Confirmed by:
  #   - Buxton 1988 / Jayson 1973: same experimental measurement
  #   - Verlackt 2018, Heirman 2019: exclude S22, use only S4+S5
  # - id: "S22"
  #   type: "irreversible"
  #   reactants:
  #     Cl-: 1
  #     OH: 1
  #   products:
  #     OH-: 1
  #     Cl: 1
  #   k: 4.3e9
  #   label: "S22: Cl- + OH -> OH- + Cl"

  - id: "S23"
    type: "irreversible"
    reactants:
      Cl: 2
    products:
      Cl2: 1
    k: 8.8e7
    label: "S23: Cl + Cl -> Cl2"

  - id: "S24"
    type: "irreversible"
    reactants:
      Cl: 1
      OH-: 1
    products:
      HOCl-: 1
    k: 1.8e10
    label: "S24: Cl + OH- -> HOCl-"

  - id: "S25"
    type: "irreversible"
    reactants:
      Cl: 1
      HO2: 1
    products:
      Cl-: 1
      H+: 1
      O2: 1
    k: 3.1e9
    label: "S25: Cl + HO2 -> Cl- + H+ + O2"

  - id: "S26"
    type: "irreversible"
    reactants:
      Cl: 1
      H2O2: 1
    products:
      Cl-: 1
      H+: 1
      HO2: 1
    k: 2.0e9
    label: "S26: Cl + H2O2 -> Cl- + H+ + HO2"

  - id: "S27"
    type: "irreversible"
    reactants:
      Cl: 1
      H: 1
    products:
      HCl: 1
    k: 1.03e8
    label: "S27: Cl + H -> HCl"

  - id: "S28"
    type: "irreversible"
    reactants:
      Cl2: 1
      HO2: 1
    products:
      Cl2-: 1
      H+: 1
      O2: 1
    k: 1.0e9
    label: "S28: Cl2 + HO2 -> Cl2- + H+ + O2"

  - id: "S29"
    type: "irreversible"
    reactants:
      Cl2: 1
      O2-: 1
    products:
      Cl2-: 1
      O2: 1
    k: 1.0e9
    label: "S29: Cl2 + O2- -> Cl2- + O2"

  - id: "S30"
    type: "irreversible"
    reactants:
      Cl2: 1
      H2O2: 1
    products:
      Cl-: 2
      H+: 2
      O2: 1
    k: 90
    label: "S30: Cl2 + H2O2 -> 2Cl- + 2H+ + O2"

  - id: "S31"
    type: "irreversible"
    reactants:
      Cl2: 1
      HO2-: 1
    products:
      Cl-: 2
      H+: 1
      O2: 1
    k: 1.1e8
    label: "S31: Cl2 + HO2- -> 2Cl- + H+ + O2"

  - id: "S32"
    type: "irreversible"
    reactants:
      Cl2-: 2
    products:
      Cl2: 1
      Cl-: 2
    k: 3.5e9
    label: "S32: Cl2- + Cl2- -> Cl2 + 2Cl-"

  - id: "S33"
    type: "irreversible"
    reactants:
      Cl2-: 1
      Cl: 1
    products:
      Cl2: 1
      Cl-: 1
    k: 2.1e9
    label: "S33: Cl2- + Cl -> Cl2 + Cl-"

  - id: "S34"
    type: "irreversible"
    reactants:
      Cl2-: 2
    products:
      Cl3-: 1
      Cl-: 1
    k: 3.70e9
    label: "S34: Cl2- + Cl2- -> Cl3- + Cl-"

  - id: "S35"
    type: "irreversible"
    reactants:
      Cl2-: 1
      H2O2: 1
    products:
      Cl-: 2
      H+: 1
      HO2: 1
    k: 1.4e6
    label: "S35: Cl2- + H2O2 -> 2Cl- + H+ + HO2"

  # S36 DISABLED 2026-04-23 — k=4.2e8 from Liu 2016 ref [44]
  # (Lundström, Christensen, Sehested, RPC 61, 109 (2001), radiation chemistry)
  # is 300× S35 rate and not present in Buxton 1988, Jayson 1973, Yu 2004,
  # Verlackt 2018, Heirman 2019. Likely non-elementary "effective" rate.
  # H2O2 rate budget diagnostic (3.2kV saline) showed S36 was 99.4% of sink.
  # Disabled to test if saline H2O2 recovers toward experimental values.
  # - id: "S36"
  #   type: "irreversible"
  #   reactants:
  #     Cl2-: 1
  #     H2O2: 1
  #   products:
  #     OH: 1
  #     OH-: 1
  #     Cl2: 1
  #   k: 4.2e8
  #   label: "S36: Cl2- + H2O2 -> OH + OH- + Cl2"

  - id: "S37"
    type: "irreversible"
    reactants:
      Cl2-: 1
      HO2: 1
    products:
      Cl-: 2
      H+: 1
      O2: 1
    k: 4.0e9
    label: "S37: Cl2- + HO2 -> 2Cl- + H+ + O2"

  - id: "S38"
    type: "irreversible"
    reactants:
      Cl2-: 1
      O2-: 1
    products:
      Cl-: 2
      O2: 1
    k: 6.0e9
    label: "S38: Cl2- + O2- -> 2Cl- + O2"

  - id: "S39"
    type: "irreversible"
    reactants:
      Cl2-: 1
      OH: 1
    products:
      HClO: 1
      Cl-: 1
    k: 1.0e9
    label: "S39: Cl2- + OH -> HClO + Cl-"

  - id: "S40"
    type: "irreversible"
    reactants:
      Cl2-: 1
      OH-: 1
    products:
      OH: 1
      Cl-: 2
    k: 7.3e6
    label: "S40: Cl2- + OH- -> OH + 2Cl-"

  - id: "S41"
    type: "irreversible"
    reactants:
      Cl2-: 1
      O3: 1
    products:
      ClO-: 1
      Cl: 1
      O2: 1
    k: 9.0e7
    label: "S41: Cl2- + O3 -> ClO- + Cl + O2"

  - id: "S42"
    type: "irreversible"
    reactants:
      Cl2-: 1
      H: 1
    products:
      H+: 1
      Cl-: 2
    k: 7e9
    label: "S42: Cl2- + H -> H+ + 2Cl-"

  - id: "S43"
    type: "irreversible"
    reactants:
      ClO-: 1
      Cl: 1
    products:
      ClO: 1
      Cl-: 1
    k: 8.2e9
    label: "S43: ClO- + Cl -> ClO + Cl-"

  - id: "S44"
    type: "irreversible"
    reactants:
      ClO-: 1
      O3: 1
    products:
      Cl-: 1
      O2: 2
    k: 110
    label: "S44: ClO- + O3 -> Cl- + 2O2"

  - id: "S45"
    type: "irreversible"
    reactants:
      ClO-: 1
      O3: 1
    products:
      ClO2-: 1
      O2: 1
